<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивная карта Южного Казахстана</title>
    <style>
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background-color: #f4e9d5; 
            margin: 0;
            padding: 20px;
        }
        
        h1 { color: #5d3e26; margin-bottom: 30px; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }

        .map-container {
            position: relative;
            width: 1000px; 
            height: 550px;
            background-image: url('map.jpg'); 
            background-size: cover;
            border: 8px solid #8b5e3c;
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        /* Невидимые кнопки (пины) */
        .pin {
            position: absolute;
            width: 60px; 
            height: 60px; 
            background-color: transparent; 
            border-radius: 50%;
            cursor: pointer;
            border: none; 
            transform: translate(-50%, -50%); 
            transition: all 0.3s ease;
            z-index: 10;
        }

        /* Эффект при наведении, чтобы пользователь понимал, что нашел точку */
        .pin:hover { 
            background-color: rgba(255, 215, 0, 0.2); 
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        /* ФОН МОДАЛЬНОГО ОКНА (Затемнение) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none; /* Скрыто по умолчанию */
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px); /* Эффект размытия заднего фона */
            transition: opacity 0.3s ease;
        }

        /* САМО ОКНО */
        .modal-content {
            background: #fff;
            width: 90%;
            max-width: 500px;
            padding: 40px;
            border-radius: 20px;
            position: relative;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
            border-top: 15px solid #8b5e3c;
            animation: popUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Анимация появления */
        @keyframes popUp {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Кнопка закрытия (крестик) */
        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 30px;
            cursor: pointer;
            color: #8b5e3c;
            line-height: 1;
            transition: color 0.2s;
        }
        .close-btn:hover { color: #ff4d4d; }

        .modal-content h2 {
            margin-top: 0;
            color: #8b5e3c;
            font-size: 28px;
        }

        .modal-content p {
            color: #444;
            line-height: 1.6;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <h1>Сакральные места Южного Казахстана</h1>

    <div class="map-container">
        <div class="pin" style="top: 52%; left: 32%;" onclick="showInfo('sayram')"></div>
        <div class="pin" style="top: 42%; left: 38%;" onclick="showInfo('arystan')"></div>
        <div class="pin" style="top: 48%; left: 49%;" onclick="showInfo('turkestan')"></div>
        <div class="pin" style="top: 73%; left: 42%;" onclick="showInfo('sauran')"></div>
        <div class="pin" style="top: 68%; left: 63%;" onclick="showInfo('appak')"></div>
        <div class="pin" style="top: 42%; left: 70%;" onclick="showInfo('kazygurt')"></div>
        <div class="pin" style="top: 48%; left: 75%;" onclick="showInfo('akmechet')"></div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeInfo()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeInfo()">&times;</span>
            <h2 id="modalTitle"></h2>
            <p id="modalDescription"></p>
        </div>
    </div>

    <script>
        const data = {
            sayram: {
                title: "Сайрам (Испиджаб)",
                description: "Один из древнейших городов Казахстана. В нем находятся мавзолеи Ибрагим-ата и Карашаш-ана (родителей Ходжи Ахмеда Яссави)."
            },
            arystan: {
                title: "Мавзолей Арыстан-Баб",
                description: "Важная мусульманская святыня. Арыстан-Баб был духовным наставником Ходжи Ахмеда Яссави. По легенде, именно ему передали аманат (четки) пророка."
            },
            turkestan: {
                title: "Туркестан",
                description: "Священный город, духовный центр тюркского мира. Главная достопримечательность — мавзолей Ходжи Ахмеда Яссави, шедевр средневекового зодчества."
            },
            sauran: {
                title: "Древний Сауран",
                description: "Крупный средневековый город-крепость. Известен своими уникальными подземными каналами (кяризами) и как важный торговый узел на Шелковом пути."
            },
            appak: {
                title: "Мечеть Аппак Ишан",
                description: "Архитектурный памятник XIX века, построенный без единого гвоздя. Уникальный образец деревянного зодчества в Южном Казахстане."
            },
            akmechet: {
                title: "Пещера Акмечеть",
                description: "Огромная пещера в Байдибекском районе. Внутри свой микроклимат и даже растут деревья. Овеяна множеством легенд о защитниках казахской степи."
            },
            kazygurt: {
                title: "Гора Казыгурт",
                description: "Священное место, окутанное легендами. По одной из них, именно здесь, а не на Арарате, остановился Ноев ковчег во время Всемирного потопа."
            }
        };

        function showInfo(id) {
            const overlay = document.getElementById('modalOverlay');
            document.getElementById('modalTitle').innerText = data[id].title;
            document.getElementById('modalDescription').innerText = data[id].description;
            overlay.style.display = 'flex';
        }

        function closeInfo() {
            document.getElementById('modalOverlay').style.display = 'none';
        }

        // Закрытие окна при нажатии клавиши Escape
        window.onkeydown = function(event) {
            if (event.key === "Escape") {
                closeInfo();
            }
        };
    </script>
</body>
</html>
